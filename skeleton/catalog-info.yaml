apiVersion: backstage.io/v1alpha1
kind: Component

metadata:
  name: ${{ values.name }}
  description: ${{ values.description }}
  annotations:
    github.com/project-slug: sairam3333/backstage-angular
    backstage.io/techdocs-ref: dir:.
spec:
  type: service
  lifecycle: production
  owner: ${{ values.owner }}
  consumesApis:
    - catalog-api
    - techdocs-api