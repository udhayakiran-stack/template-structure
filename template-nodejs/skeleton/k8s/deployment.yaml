apiVersion: apps/v1
kind: Deployment

metadata:
  name: ${{ values.name }}

  labels:
    backstage.io/kubernetes-id: ${{ values.name }}

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ${{ values.name }}

  template:
    metadata:
      labels:
        app: ${{ values.name }}
        backstage.io/kubernetes-id: ${{ values.name }}

    spec:
      containers:
        - name: ${{ values.name }}

          image: us-central1-docker.pkg.dev/backstage-prod/apps/${{ values.name }}:latest

          ports:
            - containerPort: 3000