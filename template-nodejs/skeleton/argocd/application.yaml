apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: ${{ values.name }}

spec:
  project: default

  source:
    repoURL: https://github.com/udhayakiran-stack/${{ values.name }}.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true